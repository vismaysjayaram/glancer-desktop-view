<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<!-- this sets the,, whatchamcalit, the dimensions of the thingamajig. don't reallly have another way of descirbing it. since we;re designing for a single screan ig -->
	<meta name = "viewport" content ="width=1024, height=768, initial-scale=1, user-scalable=no">
	<!-- apparently allows this to launch from homescreen with no adress bar, according to za internet. i hope-->
	<meta name="apple-mobile-web-app-capable" content="yes">
	<!-- woow the apple site that details this is really old, cheez. ig it works though, i really hoep-->
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<title>Glancer</title>
	<!-- i don't have to code like a mad ai now! yippee using the power of the following line, i can finally organise. -->
	<link rel="stylesheet" href="style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
	

</head>

<body>
	<div class = "canvas">
		<div class="canvas-bg"></div>
		<div class="canvas-grid">
			<div class="card time-card">
				<time class = "clock-digits">
					<span class = "hours">00</span><span class = "colon">:</span><span class = "minutes">00</span>
				</time>
				<div class ="date">Sep 1st 1926</div>
			</div>
			<div class="inner-grid">
				<div class="card weather-card">weather</div>
				<div class="card media-card">media</div>
				<div class="card printer-card">printer</div>
			</div>
			<div class="card calendar-card">
				<div class = "eyebrow eyebrow-upnext"> UP NEXT</div>
				<div class = "calendar-upnext-time">9:05</div>
				<div class = "calendar-upnext-event"><span class = "upnext-event-name">Time to play mario</span><span class="upnext-event-intime"><span class="upnext-event-intime-number">30</span><span class="upnext-event-intime-mins-text">mins</span></span></div>
				<!-- <div class="calendar-card-spacer"></div> -->
				<hr>
				<div class="eyebrow later-today">LATER TODAY</div>
				<ul class = "events-upnext">
					<li><span class="item-time">free</span><span class="item-title">no items today!</span></li>

				</ul>
			</div>
			<div class="card photo-card">photo</div>


		</div>
	</div>
<script src="script.js"></script>
</body>
</html>
